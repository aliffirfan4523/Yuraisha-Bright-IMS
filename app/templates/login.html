{% extends "base.html" %}

{% block title %}Login | Yuraisha Bright Inventory System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-center">Login</h1>
                <p class="text-muted text-center mb-4">Enter your account details to continue.</p>

                <form method="POST" action="{{ url_for('main.login') }}">
                    <div class="mb-3">
                        <label for="login_id" class="form-label">Username or email</label>
                        <input type="text" class="form-control" id="login_id" name="login_id" placeholder="manager or manager@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Need an account?
                    <a href="{{ url_for('main.register') }}">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
