<div class="mb-3">
    <label class="form-label">Movement Type</label>
    <select class="form-select" name="movement_type" required>
        <option value="outbound">Outbound - Sell Oil / Stock</option>
        <option value="inbound">Inbound - Buy Material</option>
    </select>
</div>
<div class="mb-3">
    <label class="form-label">Supplier / Customer Name</label>
    <input class="form-control" name="client_name" required>
</div>
<div class="mb-3">
    <label class="form-label">Inventory Item</label>
    <select class="form-select" name="item_id" required>
        {% for item in items %}
        <option value="{{ item.item_id }}">{{ item.item_name }} ({{ item.unit }})</option>
        {% endfor %}
    </select>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Quantity</label>
        <input class="form-control" type="number" min="0.01" step="0.01" name="quantity" required>
    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Unit</label>
        <input class="form-control" name="unit" placeholder="Liters, Kg, Boxes" required>
    </div>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Amount (RM)</label>
        <input class="form-control" type="number" min="0" step="0.01" name="amount" required>
    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Payment Status</label>
        <select class="form-select" name="payment_status" required>
            <option value="completed">Completed</option>
            <option value="pending">Pending</option>
            <option value="failed">Failed</option>
        </select>
    </div>
</div>
<div class="mb-3">
    <label class="form-label">Transaction Date</label>
    <input class="form-control" type="date" name="transaction_date" required>
</div>
<div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea class="form-control" name="notes" rows="3"></textarea>
</div>
